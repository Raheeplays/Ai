<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal AI Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 500px; height: 90vh; background: #fff; display: flex; flex-direction: column; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin: 10px; }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; border-radius: 15px 15px 0 0; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com'); }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 85%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .user { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 0; box-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .bot { background: #ffffff; align-self: flex-start; border-bottom-left-radius: 0; box-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; border-radius: 0 0 15px 15px; gap: 8px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: 0.3s; }
        button:hover { background: #128c7e; }
        .loading { font-style: italic; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Gemini AI Chatbot</div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Kuch poochiye..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // Apni API key yahan Rahee ki jagah paste karein
    const API_KEY = "AIzaSyCiO_EgsKi7rQB2V8gjraWM2-g7by11Ym4"; 
    const API_URL = `https://generativelanguage.googleapis.com{API_KEY}`;

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();

        if (!message) return;

        appendMessage("user", message);
        inputField.value = "";

        // Loading message
        const loadingId = "loading-" + Date.now();
        appendMessage("bot", "Soch raha hoon...", loadingId);

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: message }] }]
                })
            });

            const data = await response.json();
            
            // Loading text hatayein
            document.getElementById(loadingId).remove();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const botText = data.candidates[0].content.parts[0].text;
                appendMessage("bot", botText);
            } else if (data.error) {
                appendMessage("bot", "API Error: " + data.error.message);
            } else {
                appendMessage("bot", "Maafi chahta hoon, samajh nahi aaya.");
            }
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("bot", "Network Error: Internet check karein.");
        }
    }

    function appendMessage(sender, text, id = null) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = `msg ${sender}`;
        if (id) div.id = id;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
