<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Chatbot</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .user { background: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #e4e6eb; color: black; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { border-top: 1px solid #ddd; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCiO_EgsKi7rQB2V8gjraWM2-g7by11Ym4";
    const API_URL = `https://generativelanguage.googleapis.com{API_KEY}`;

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        appendMessage("user", message);
        inputField.value = "";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: message }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                appendMessage("bot", "API Error: " + data.error.message);
                return;
            }

            // Gemini 1.5 Flash Response Path Fix:
            if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                const botText = data.candidates[0].content.parts[0].text;
                appendMessage("bot", botText);
            } else {
                appendMessage("bot", "Sorry, no response found.");
            }

        } catch (error) {
            appendMessage("bot", "Technical Error: Check console or hosting.");
            console.error(error);
        }
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
